name: YouMenuTube
options:
  bundleIdPrefix: com.youmenutube
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  YouTubeKit:
    url: https://github.com/b5i/YouTubeKit.git
    from: "2.0.0"

targets:
  YouMenuTube:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: YouMenuTube
        CFBundleDisplayName: YouMenuTube
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Stamped at build time by the postBuildScript below. Defaults kept
        # blank so a brand-new clone shows a valid bundle even before the
        # script has ever run.
        GitCommit: ""
        IsDevBuild: ""
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Sources/YouMenuTube.entitlements
      properties:
        # Intentionally NOT sandboxed: the browser-cookie importer reads
        # other apps' on-disk cookie stores (Safari binarycookies; Chromium
        # SQLite + login-keychain AES key; Firefox SQLite). An app-sandboxed
        # host can't read those paths even with user consent, since the
        # sandbox container layer blocks them before TCC is consulted.
        com.apple.security.app-sandbox: false
    dependencies:
      - package: YouTubeKit
        product: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmenutube.app
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Xcode 15+ sandboxes script phases by default, which blocks our
        # post-build stamp script from reading .git/HEAD and writing the
        # built Info.plist. The script is trusted (it's in the repo), so
        # opt out rather than enumerate every .git entry as an input.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
    postBuildScripts:
      - name: Stamp version + build number + git commit into Info.plist
        # Runs after Resources are processed but before code signing, so the
        # values we write end up signed into the bundle. `basedOnDependencyAnalysis`
        # is off because HEAD doesn't map to a path Xcode tracks.
        #
        # Final values:
        #   CFBundleShortVersionString  ← derived from `git describe --tags`
        #     · on a v* tag       → "0.2.0"
        #     · N commits past it → "0.2.0+N"
        #     · no tags yet       → leave the project.yml fallback in place
        #   CFBundleVersion             ← `git rev-list --count HEAD` (monotonic)
        #   GitCommit                   ← short SHA (with -dirty when applicable)
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$INFO_PLIST" ] || exit 0
          cd "${SRCROOT}"

          # Version + dev marker
          # Always store the *base* tag in CFBundleShortVersionString so the
          # display version stays clean ("0.1.1"). The "dev" / commits-ahead
          # detail goes into a separate IsDevBuild key that the UI surfaces.
          IS_DEV=""
          if SHORT=$(git describe --exact-match --tags HEAD 2>/dev/null); then
            SHORT="${SHORT#v}"
          elif DESC=$(git describe --tags --match 'v*' 2>/dev/null); then
            SHORT=$(echo "$DESC" | sed -E 's/^v//; s/-[0-9]+-g[0-9a-f]+$//')
            AHEAD=$(echo "$DESC" | sed -nE 's/.*-([0-9]+)-g[0-9a-f]+$/\1/p')
            IS_DEV="dev+${AHEAD}"
          else
            SHORT=""   # no tags — keep whatever project.yml put in there
            IS_DEV="dev"
          fi
          [ -n "$SHORT" ] && /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $SHORT" "$INFO_PLIST"
          /usr/libexec/PlistBuddy -c "Set :IsDevBuild $IS_DEV" "$INFO_PLIST"

          # Monotonic build number
          BUILD=$(git rev-list --count HEAD 2>/dev/null || echo "1")
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD" "$INFO_PLIST"

          # Short SHA (with -dirty marker for uncommitted local changes)
          COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "")
          DIRTY=""
          if [ -n "$COMMIT" ] && ! git diff --quiet 2>/dev/null; then
            DIRTY="-dirty"
          fi
          /usr/libexec/PlistBuddy -c "Set :GitCommit ${COMMIT}${DIRTY}" "$INFO_PLIST"

  YouMenuTubeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: YouMenuTube
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmenutube.app.tests
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  YouMenuTube:
    # Explicit so it coexists with the Demo scheme below — defining any
    # top-level schemes disables xcodegen's autogeneration for the target.
    build:
      targets:
        YouMenuTube: all
        YouMenuTubeTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - YouMenuTubeTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  YouMenuTube Demo:
    # Builds the app and launches it with -demo-mode so YouTubeService
    # serves hardcoded fixtures from DemoData.swift instead of hitting
    # YouTube. Use this scheme for marketing screenshots.
    build:
      targets:
        YouMenuTube: all
    run:
      config: Debug
      commandLineArguments:
        "-demo-mode": true
