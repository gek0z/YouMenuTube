name: YouMenuTube
options:
  bundleIdPrefix: com.youmenutube
  deploymentTarget:
    macOS: "15.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "15.0"
    ENABLE_HARDENED_RUNTIME: YES
    ENABLE_APP_SANDBOX: NO
  configs:
    Debug:
      SWIFT_OPTIMIZATION_LEVEL: "-Onone"
    Release:
      SWIFT_OPTIMIZATION_LEVEL: "-O"

packages:
  YouTubeKit:
    url: https://github.com/b5i/YouTubeKit.git
    from: "2.0.0"

targets:
  YouMenuTube:
    type: application
    platform: macOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleName: YouMenuTube
        CFBundleDisplayName: YouMenuTube
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Stamped at build time by the postBuildScript below. Default kept
        # blank so a brand-new clone shows a valid bundle even before the
        # script has ever run.
        GitCommit: ""
        LSMinimumSystemVersion: "15.0"
        LSUIElement: true
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
    entitlements:
      path: Sources/YouMenuTube.entitlements
      properties:
        # Intentionally NOT sandboxed: WebKit's WebContent process gets the
        # host app's sandbox, and an app-sandboxed host blocks pasteboard
        # (so 1Password copy-paste fails) and ASAuthorization services (so
        # passkey / Apple Passwords autofill can't surface in WKWebView).
        com.apple.security.app-sandbox: false
    dependencies:
      - package: YouTubeKit
        product: YouTubeKit
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmenutube.app
        CODE_SIGN_STYLE: Automatic
        GENERATE_INFOPLIST_FILE: NO
    postBuildScripts:
      - name: Stamp git commit into Info.plist
        # Runs after Resources are processed but before code signing, so the
        # SHA we write ends up signed into the bundle. `basedOnDependencyAnalysis`
        # is off because the input (HEAD) doesn't map to a path Xcode tracks.
        basedOnDependencyAnalysis: false
        script: |
          set -eu
          INFO_PLIST="${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
          [ -f "$INFO_PLIST" ] || exit 0
          COMMIT=$(git -C "${SRCROOT}" rev-parse --short HEAD 2>/dev/null || echo "")
          DIRTY=""
          if [ -n "$COMMIT" ] && ! git -C "${SRCROOT}" diff --quiet 2>/dev/null; then
            DIRTY="-dirty"
          fi
          /usr/libexec/PlistBuddy -c "Set :GitCommit ${COMMIT}${DIRTY}" "$INFO_PLIST"

  YouMenuTubeTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: Tests
    dependencies:
      - target: YouMenuTube
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.youmenutube.app.tests
        MACOSX_DEPLOYMENT_TARGET: "15.0"
        GENERATE_INFOPLIST_FILE: YES
